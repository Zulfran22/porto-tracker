<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="#eab308"/>

  <!-- W mark: left peak lower, right peak higher → ascending growth -->
  <polyline points="70,408 164,168 256,310 344,148 440,408"
    fill="none" stroke="#111111" stroke-width="64"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Coin dot above right (higher) peak — wealth symbol -->
  <circle cx="344" cy="68" r="30" fill="#111111"/>
</svg>
