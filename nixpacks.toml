[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pdo",
  "php82Extensions.pdo_pgsql",
  "php82Extensions.pdo_sqlite",
  "php82Extensions.mbstring",
  "php82Extensions.tokenizer",
  "php82Extensions.xml",
  "php82Extensions.ctype",
  "php82Extensions.fileinfo",
  "php82Extensions.curl",
  "php82Extensions.zip",
  "php82Extensions.bcmath",
  "php82Extensions.openssl",
  "php82Extensions.intl",
  "nodejs_20",
  "nodePackages.npm"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && (php artisan schedule:work &) && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
