# Render free tier menidurkan app setelah 15 menit idle (cold start 30-60 dtk).
# Ping /up tiap 10 menit menjaga app tetap bangun — jatah 750 jam/bulan Render
# cukup untuk satu service nyala 24/7. Jadwal Actions bisa telat beberapa
# menit; kalau sesekali app sempat tidur, ping berikutnya membangunkannya lagi
# (curl menunggu sampai 120 dtk, cukup untuk cold start).
name: Keep app awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /up
        run: curl -sS --fail --max-time 120 --retry 2 --retry-delay 20 https://porto-tracker.onrender.com/up && echo " OK"
