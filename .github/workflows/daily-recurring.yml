# Jalur utama job harian recurring:apply adalah schedule:work DI DALAM
# container (routes/console.php, dailyAt 00:05) — workflow ini memastikan app
# terjaga menjelang jam itu (16:50 UTC = 23:50 WIB), lalu 30 menit kemudian
# memanggil webhook /cron/recurring-apply sebagai CADANGAN kalau jadwal
# internal terlewat. Webhook butuh secret repo CRON_TOKEN (Settings → Secrets
# and variables → Actions) — tanpa secret, langkah cadangan dilewati diam-diam
# dan hanya jalur internal yang bekerja. Command-nya idempoten, jadi aman
# terpanggil dua kali di hari yang sama.
name: Daily recurring transactions

on:
  schedule:
    - cron: '50 16 * * *' # 23:50 WIB — bangunkan app menjelang jadwal internal 00:05
    - cron: '20 17 * * *' # 00:20 WIB — cadangan via webhook ber-token
  workflow_dispatch:

permissions: {}

jobs:
  wake-and-apply:
    runs-on: ubuntu-latest
    env:
      CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
    steps:
      - name: Wake app
        run: curl -sS --fail --max-time 150 --retry 3 --retry-delay 30 https://porto-tracker.onrender.com/up && echo " awake"

      - name: Apply recurring via webhook (cadangan)
        run: |
          if [ -z "$CRON_TOKEN" ]; then
            echo "Secret CRON_TOKEN belum diset — dilewati (scheduler internal yang menangani)."
            exit 0
          fi
          curl -sS --fail --max-time 150 --retry 3 --retry-delay 30 "https://porto-tracker.onrender.com/cron/recurring-apply?token=${CRON_TOKEN}"
